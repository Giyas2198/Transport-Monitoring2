    <script>
        // --- KONFIGURASI ---

           authDomain: "tms-monitoring-6ea3e.firebaseapp.com",
           projectId: "tms-monitoring-6ea3e",

        };
        const FONNTE_TOKEN = "DHkFE7UvY1hjCAsQUQrt"; 

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentData = [];
        let cardCounter = 1;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        window.onload = async () => {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500">Loading Data...</div>';
            try {
                const snapshot = await db.collection("daily_reports").orderBy("timestamp", "desc").get();
                grid.innerHTML = "";
                snapshot.forEach(doc => { renderCard(doc.id, doc.data()); cardCounter++; });
            } catch (e) { grid.innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat data Firestore.</p>'; }
        };

        function processData() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) return alert("Pilih file CSV!");
            Papa.parse(fileInput.files[0], {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    currentData = results.data;
                    document.getElementById('statusAlert').classList.remove('hidden');
                    document.getElementById('matchCount').innerText = currentData.length;
                    document.getElementById('saveBtn').classList.remove('hidden');
                }
            });
        }

        async function saveToDashboard() {
            if (currentData.length === 0) return;
            const cardId = Date.now().toString();
            const reportData = { title: `Tarikan ${cardCounter}`, timestamp: firebase.firestore.FieldValue.serverTimestamp(), rows: currentData, totalRows: currentData.length };
            try {
                await db.collection("daily_reports").doc(cardId).set(reportData);
                renderCard(cardId, reportData);
                cardCounter++; resetUI();
                alert("Berhasil disimpan!");
            } catch (e) { alert("Gagal Simpan!"); }
        }

function renderCard(id, data) {
    const grid = document.getElementById('dashboardGrid');
    const dateStr = data.timestamp ? new Date(data.timestamp.seconds * 1000).toLocaleString('id-ID') : 'Baru';
    const ticketIDs = data.rows.map(row => String(row['Delivery Ticket'] || row['DELIVERY TICKET'] || row['DEL NOTE NO']));

    grid.insertAdjacentHTML('afterbegin', `
        <div id="card-${id}" class="bg-slate-800 p-6 rounded-2xl border border-slate-700 hover:border-blue-500 transition-all shadow-lg relative">
            <div class="absolute top-4 right-4">
                <input type="checkbox" value="${id}" onchange="updateBulkUI()" class="card-checkbox w-5 h-5 accent-blue-500 cursor-pointer">
            </div>

            <div onclick="showDetail('${id}')" class="cursor-pointer">
                <div class="text-[10px] text-slate-500 mb-2 font-bold uppercase tracking-widest">${dateStr}</div>
                <h3 class="text-lg font-bold uppercase text-blue-400 leading-tight mb-1">${data.title}</h3>
                <p class="text-slate-400 text-xs font-medium">${data.totalRows} Baris Data</p>
            </div>

            <div class="mt-6 pt-4 border-t border-slate-700 flex justify-between items-center">
                <button onclick="showDetail('${id}')" class="text-[10px] font-black text-blue-500 uppercase tracking-tighter hover:text-blue-400 transition-colors">
                    Lihat Detail
                </button>
                <button onclick='toggleResponse("${id}", ${JSON.stringify(ticketIDs)})' class="text-[10px] font-black text-emerald-500 uppercase tracking-tighter hover:text-emerald-400 transition-colors">
                    Cek Respon Vendor
                </button>
            </div>

            <div id="response-panel-${id}" class="hidden mt-4 p-3 bg-slate-900/80 rounded-2xl border border-slate-700 shadow-inner">
                <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                    <span class="text-[9px] font-black text-slate-500 uppercase">Live Response</span>
                    
                    <button onclick="downloadExcelResponse('${id}')" class="group flex items-center gap-1.5 bg-emerald-600/10 hover:bg-emerald-600 px-2 py-1 rounded-lg transition-all border border-emerald-600/30">
                        <span class="text-emerald-500 group-hover:text-white text-[9px] font-bold">EXCEL</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-emerald-500 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                    </button>
                    <button onclick="sendEmailNotif()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2 transition-all">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
    </svg>
    KIRIM EMAIL
</button>
                </div>
                
                <div id="response-list-${id}" class="space-y-2 text-[11px] max-h-48 overflow-y-auto response-scroll">
                    <p class="text-slate-600 italic text-center py-2">Menghubungkan ke server...</p>
                </div>
            </div>

            <div class="mt-4 flex justify-end">
                <button onclick="deleteCard('${id}')" class="p-2 text-slate-600 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>

            <textarea id="hidden-data-${id}" class="hidden">${JSON.stringify(data.rows)}</textarea>

// FUNGSI UNTUK DOWNLOAD EXCEL PER CARD
async function downloadExcelResponse(cardId) {
    const rawData = JSON.parse(document.getElementById(`hidden-data-${cardId}`).value);
    const ticketIDs = rawData.map(row => String(row['Delivery Ticket'] || row['DELIVERY TICKET'] || row['DEL NOTE NO']));
    const cardTitle = document.querySelector(`#card-${cardId} h3`).innerText;

    try {
        const snapshot = await db.collection("vendor_updates").get();
        let excelData = [];

        snapshot.forEach(doc => {
            if (ticketIDs.includes(doc.id)) {
                const d = doc.data();
                const originalRow = rawData.find(r => String(r['Delivery Ticket'] || r['DELIVERY TICKET'] || r['DEL NOTE NO']) === doc.id);

                excelData.push({
                    "TICKET ID": doc.id,
                    "TRANSPORTER": originalRow ? (originalRow['TRANSPORTER'] || originalRow['Transporter']) : "-",
                    "CUSTOMER": originalRow ? (originalRow['SHIP TO NAME'] || originalRow['Customer Name']) : "-",
                    "ESTIMASI TIBA (ETA)": d.estimasi_tiba || "Belum Update",
                    "STATUS UPDATE": d.catatan_vendor || "-",
                    "CATATAN TAMBAHAN": d.catatan_tambahan || "-",
                    "WAKTU UPDATE": d.last_vendor_update ? new Date(d.last_vendor_update.seconds * 1000).toLocaleString('id-ID') : "-"
                });
            }
        });

        if (excelData.length === 0) return alert("Belum ada respon dari vendor untuk tarikan ini.");

        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Respon Vendor");
        
        const fileName = `TMS_Response_${cardTitle.replace(/\s+/g, '_')}.xlsx`;
        XLSX.writeFile(workbook, fileName);

    } catch (error) {
        console.error("Excel Error:", error);
        alert("Gagal mengunduh file.");
    }
}

        async function deleteCard(id) {
            if (!confirm("Hapus data?")) return;
            await db.collection("daily_reports").doc(id).delete();
            document.getElementById(`card-${id}`).remove();
            updateBulkUI();
        }

        function updateBulkUI() {
            const count = document.querySelectorAll('.card-checkbox:checked').length;
            document.getElementById('bulkActions').classList.toggle('hidden', count === 0);
            document.getElementById('selectedCount').innerText = count;
        }

        function previewOnDelivery() {
            let combined = [];
            document.querySelectorAll('.card-checkbox:checked').forEach(cb => {
                combined = combined.concat(JSON.parse(document.getElementById(`hidden-data-${cb.value}`).value));
            });

            const filtered = combined.filter(i => (i.Status || i.STATUS || "").toUpperCase() === "ON_DELIVERY");
            if (filtered.length === 0) return alert("Tidak ada data ON_DELIVERY!");

            document.getElementById('vendorFilterContainer').classList.remove('hidden');
            document.getElementById('vendorActionContainer').classList.remove('hidden');

            const vendorDropdown = document.getElementById('vendorDropdown');
            const vendors = [...new Set(filtered.map(item => item['TRANSPORTER'] || item['Transporter']))].filter(Boolean).sort();
            vendorDropdown.innerHTML = '<option value="">SEMUA TRANSPORTER</option>';
            vendors.forEach(v => { 
                const opt = document.createElement('option');
                opt.value = v.toUpperCase(); opt.textContent = v.toUpperCase();
                vendorDropdown.appendChild(opt);
            });

            renderTableModal(filtered, "Preview ON_DELIVERY");
        }

        function showDetail(id) {
            const data = JSON.parse(document.getElementById(`hidden-data-${id}`).value);
            document.getElementById('vendorFilterContainer').classList.add('hidden');
            document.getElementById('vendorActionContainer').classList.add('hidden');
            renderTableModal(data, "Detail Data");
        }

        function renderTableModal(data, title) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            const cols = Object.keys(data[0]);
            document.getElementById('modalTitle').innerText = title;
            
            head.innerHTML = `<th class="p-3 bg-slate-800 border-b border-slate-700 text-center"><input type="checkbox" onclick="toggleAllRows(this)"></th>` + 
                             cols.map(c => `<th class="p-4 bg-slate-800 text-slate-500 font-bold uppercase text-[9px] min-w-[130px] border-b border-slate-700">${c}</th>`).join('');
            
            body.innerHTML = data.map(row => {
                const vendorName = row['TRANSPORTER'] || row['Transporter'] || "";
                return `<tr class="hover:bg-slate-800 border-b border-slate-800" data-vendor="${vendorName}">
                    <td class="p-3 text-center"><input type="checkbox" class="row-checkbox" data-row='${JSON.stringify(row)}'></td>
                    ${cols.map(c => `<td class="p-3 text-slate-300">${row[c] || "-"}</td>`).join('')}
                </tr>`;
            }).join('');
            
            document.getElementById('modal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function filterByVendor() {
            const val = document.getElementById('vendorDropdown').value.toUpperCase();
            document.querySelectorAll('#tableBody tr').forEach(row => {
                row.style.display = (val === "" || row.getAttribute('data-vendor').toUpperCase() === val) ? "" : "none";
            });
        }

        function sendEmailNotif() {
    // 1. Minta Input Email Customer
    const customerEmail = prompt("Masukkan Email Customer:");
    if (!customerEmail) return;

    // 2. Ambil data dari baris yang ingin dikirim (Contoh ambil No DT dari UI atau Firebase)
    // Sesuaikan variabel di bawah dengan cara Anda mengambil data di index.html
    const noDT = document.getElementById('modalDtNumber')?.innerText || "157979"; 
    const estimasi = "Sore 14:30"; // Bisa diambil dari input form Anda

    // 3. Kirim ke Web App Google Apps Script
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzcTaLNR2dqdctlvAmmFj0fzFoNdiFOfSxA1-386Np-5S7Ca4FqGjPm6Y2E5AwfU9nf/exec"; // Ganti dengan URL hasil Deploy Apps Script

    fetch(webAppUrl, {
        method: "POST",
        mode: "no-cors",
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email: customerEmail,
            dt: noDT,
            eta: estimasi,
            link: "https://tms-monitoring-6ea3e.web.app/cs.html?id=" + noDT
        })
    })
    .then(() => alert("Email Notifikasi Sedang Dikirim!"))
    .catch(err => alert("Gagal kirim email: " + err));
}

        async function pushToVendor() {
            const visibleRows = document.querySelectorAll('#tableBody tr:not([style*="display: none"]) .row-checkbox:checked');
            if (visibleRows.length === 0) return alert("Pilih data!");
            
            const waTarget = document.getElementById('waGroupSelect').value;
            if (!confirm(`Kirim ke Grup WA yang dipilih?`)) return;

            let ticketList = [];
            let idArray = [];

            for (let el of visibleRows) {
                const rowData = JSON.parse(el.getAttribute('data-row'));
                const ticketID = rowData['Delivery Ticket'] || rowData['DELIVERY TICKET'] || rowData['DEL NOTE NO'];
                await db.collection("vendor_updates").doc(String(ticketID)).set({ ...rowData, last_notified: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                ticketList.push(`DT *${ticketID}*`);
                idArray.push(ticketID);
            }

            const message = `⚠️ *REMINDER TMS*\n━━━━━━━━━━\n${ticketList.join(" | ")}\n\n🔗 *Update:* ${window.location.href.replace('index.html', '')}respon.html?ids=${idArray.join(',')}\n━━━━━━━━━━`;
            
            const fd = new FormData();
            fd.append("target", waTarget);
            fd.append("message", message);
            fetch("https://api.fonnte.com/send", { method: 'POST', headers: { "Authorization": FONNTE_TOKEN }, body: fd })
            .then(() => { alert("Terkirim!"); closeModal(); });
        }
        async function downloadExcelResponse(cardId) {
    // 1. Ambil data asli dari hidden textarea untuk tahu list tiket di card ini
    const rawData = JSON.parse(document.getElementById(`hidden-data-${cardId}`).value);
    const ticketIDs = rawData.map(row => String(row['Delivery Ticket'] || row['DELIVERY TICKET'] || row['DEL NOTE NO']));
    const cardTitle = document.querySelector(`#card-${cardId} h3`).innerText;

    try {
        // 2. Ambil data terbaru dari collection vendor_updates
        const snapshot = await db.collection("vendor_updates").get();
        let excelData = [];

        snapshot.forEach(doc => {
            // Cek apakah tiket ini ada di dalam card yang sedang kita download
            if (ticketIDs.includes(doc.id)) {
                const d = doc.data();
                // Cari data original di CSV untuk melengkapi kolom (seperti Transporter, Tujuan, dll)
                const originalRow = rawData.find(r => String(r['Delivery Ticket'] || r['DELIVERY TICKET'] || r['DEL NOTE NO']) === doc.id);

                excelData.push({
                    "TICKET ID": doc.id,
                    "TRANSPORTER": originalRow ? (originalRow['TRANSPORTER'] || originalRow['Transporter']) : "-",
                    "CUSTOMER": originalRow ? (originalRow['SHIP TO NAME'] || originalRow['Customer Name']) : "-",
                    "ESTIMASI TIBA (ETA)": d.estimasi_tiba || "Belum Update",
                    "CATATAN VENDOR": d.catatan_vendor || "-",
                    "CATATAN TAMBAHAN": d.catatan_tambahan || "-",
                    "WAKTU UPDATE": d.last_vendor_update ? new Date(d.last_vendor_update.seconds * 1000).toLocaleString('id-ID') : "-"
                });
            }
        });

        if (excelData.length === 0) {
            return alert("Belum ada respon vendor untuk data ini!");
        }

        // 3. Proses Pembuatan File Excel
        const worksheet = XLSX.utils.json_to_sheet(excelData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Respon Vendor");

        // 4. Download File
        const fileName = `Respon_Vendor_${cardTitle.replace(/\s+/g, '_')}_${new Date().getTime()}.xlsx`;
        XLSX.writeFile(workbook, fileName);

    } catch (error) {
        console.error("Error download excel:", error);
        alert("Gagal mendownload data!");
    }
}

        function toggleAllRows(s) { document.querySelectorAll('#tableBody tr:not([style*="display: none"]) .row-checkbox').forEach(cb => cb.checked = s.checked); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.body.classList.remove('modal-open'); }
        function resetUI() { document.getElementById('saveBtn').classList.add('hidden'); document.getElementById('statusAlert').classList.add('hidden'); document.getElementById('fileInput').value = ""; }

        let activeListeners = {};
        async function toggleResponse(cardId, ticketIDs) {
            const panel = document.getElementById(`response-panel-${cardId}`);
            const list = document.getElementById(`response-list-${cardId}`);
            panel.classList.toggle('hidden');
            if (!panel.classList.contains('hidden') && !activeListeners[cardId]) {
                activeListeners[cardId] = db.collection("vendor_updates").onSnapshot(snap => {
                    let html = "";
                    snap.forEach(doc => {
                        if (ticketIDs.includes(doc.id)) {
                            const d = doc.data();
                            if (d.estimasi_tiba) html += `<div class="p-2 bg-slate-800 rounded mb-1 border-l-2 border-emerald-500"><b>${doc.id}</b>: ETA ${d.estimasi_tiba} - ${d.catatan_vendor}</div>`;
                        }
                    });
                    list.innerHTML = html || "Belum ada respon.";
                });
            }
        }
    </script>
