<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service - TMS Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10">
        <div class="max-w-md mx-auto flex items-center gap-4">
            <div class="bg-red-600 text-white p-2 rounded-lg font-black text-xs">JOTUN</div>
            <h1 class="font-bold text-slate-800 uppercase tracking-tight text-sm">Customer Support</h1>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6">
        <div class="flex items-start gap-3 mb-8">
            <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600 font-bold shrink-0 shadow-sm border border-red-200">CS</div>
            <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-slate-200">
                <p class="text-sm font-medium leading-relaxed">Halo! Saya asisten logistik Anda. <br><span class="font-bold">Silakan masukkan Nomor Tiket (DT)</span> Anda untuk mengecek status kiriman.</p>
            </div>
        </div>

        <div class="bg-white p-2 rounded-2xl shadow-xl border border-slate-100 mb-8 flex gap-2">
            <input type="text" id="ticketSearch" placeholder="Contoh: 80001234..." class="flex-1 bg-transparent px-4 py-3 outline-none text-sm font-bold uppercase placeholder:lowercase">
            <button onclick="searchStatus()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase transition-all active:scale-95 shadow-lg">Cek</button>
        </div>

        <div id="resultArea" class="hidden">
            <div class="bg-white rounded-3xl p-6 shadow-2xl border border-slate-200 relative overflow-hidden">
                <div id="statusBadge" class="absolute top-4 right-4 px-3 py-1 rounded-full text-[10px] font-black uppercase"></div>
                
                <h2 id="resTicket" class="text-xs font-bold text-slate-400 mb-4 tracking-widest uppercase"></h2>
                
                <div class="space-y-6">
                    <div>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Tujuan Pengiriman</p>
                        <p id="resCustomer" class="font-black text-slate-800"></p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Estimasi Tiba</p>
                            <p id="resEta" class="font-black text-red-600 text-lg"></p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Driver Note</p>
                            <p id="resNote" class="font-bold text-slate-700"></p>
                        </div>
                    </div>

                    <div id="resExtra" class="p-3 bg-slate-50 rounded-xl border border-slate-100 italic text-xs text-slate-500"></div>
                </div>
            </div>
        </div>

        <div id="errorArea" class="hidden text-center py-10">
            <p class="text-slate-400 text-sm font-medium">Maaf, Nomor Tiket tidak ditemukan atau belum di-update oleh driver.</p>
        </div>
    </main>

    <script>
        const firebaseConfig = {
           apiKey: "AIzaSyBuFvsRVcZCZxdW1o1uQOsP-zW2ySOhhlM",
           authDomain: "tms-monitoring-6ea3e.firebaseapp.com",
           projectId: "tms-monitoring-6ea3e",
           storageBucket: "tms-monitoring-6ea3e.firebasestorage.app",
           messagingSenderId: "290573726581",
           appId: "1:290573726581:web:8293e1bb62f4d6606f193c",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // FUNGSI UTAMA PENCARIAN
        async function searchStatus() {
            const inputField = document.getElementById('ticketSearch');
            const input = inputField.value.trim();
            const resultArea = document.getElementById('resultArea');
            const errorArea = document.getElementById('errorArea');

            if(!input) return;

            try {
                const doc = await db.collection("vendor_updates").doc(input).get();
                
                if (doc.exists) {
                    const data = doc.data();
                    resultArea.classList.remove('hidden');
                    errorArea.classList.add('hidden');

                    document.getElementById('resTicket').innerText = "Ticket ID: " + doc.id;
                    document.getElementById('resCustomer').innerText = data['SHIP TO NAME'] || data['Customer Name'] || data['Customer'] || "CUSTOMER JOTUN";
                    document.getElementById('resEta').innerText = data.estimasi_tiba || "PENDING";
                    document.getElementById('resNote').innerText = data.catatan_vendor || "Dalam Perjalanan";
                    document.getElementById('resExtra').innerText = data.catatan_tambahan ? `"${data.catatan_tambahan}"` : "Informasi: Kendaraan sedang menuju lokasi Anda.";
                    
                    const badge = document.getElementById('statusBadge');
                    badge.innerText = "ON DELIVERY";
                    badge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-[10px] font-black uppercase bg-emerald-100 text-emerald-600 border border-emerald-200";
                } else {
                    resultArea.classList.add('hidden');
                    errorArea.classList.remove('hidden');
                }
            } catch (e) { 
                console.error(e);
                alert("Gangguan Koneksi!"); 
            }
        }

        // ==========================================
        // TAMBAHAN NO 2: OTOMATIS BACA DARI LINK EMAIL
        // ==========================================
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const idDariEmail = urlParams.get('id'); // Mengambil nilai dari ?id=...
            
            if (idDariEmail) {
                // Masukkan ID ke dalam kotak input
                document.getElementById('ticketSearch').value = idDariEmail;
                // Langsung jalankan fungsi cari tanpa klik tombol
                searchStatus();
            }
        };
    </script>
</body>
</html>
