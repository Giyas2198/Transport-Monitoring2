<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Driver - TMS Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
        <div id="loader" class="text-center py-10">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
            <p class="text-slate-400 font-bold uppercase text-xs tracking-widest">Mengambil Data...</p>
        </div>

        <div id="formContainer" class="hidden">
            <header class="mb-8 text-center">
                <h1 class="text-2xl font-black text-blue-500 tracking-tighter uppercase">Update Pengiriman</h1>
                <p class="text-slate-400 text-xs font-bold uppercase mt-1">Sistem Monitoring Vendor</p>
            </header>

            <div class="space-y-6">
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Customer</span>
                        <span id="displayCustomer" class="text-xs font-bold text-white">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[10px] font-bold text-slate-500 uppercase">Truck / Plat</span>
                        <span id="displayTruck" class="text-xs font-bold text-emerald-400">-</span>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Nomor Delivery Ticket</label>
                        <select id="selectTicket" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500 transition-all font-bold">
                            </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Estimasi Tiba (Jam)</label>
                        <input type="time" id="inputEta" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Keterangan / Kendala</label>
                        <select id="inputNote" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500 transition-all">
                            <option value="Lancar">Lancar / On Progress</option>
                            <option value="Macet di Tol">Macet di Tol</option>
                            <option value="Mobil Trouble">Mobil Trouble</option>
                            <option value="Sudah diterima, DT belum balik">Sudah diterima, DT belum balik</option>
                            <option value="Toko Tutup">Toko Tutup</option>
                            <option value="Penerima tidak di tempat">Penerima tidak di tempat</option>
                            <option value="Kesorean">Kesorean</option>
                            <option value="Lainnya">Lainnya (Tulis di Catatan)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Catatan Tambahan (Opsional)</label>
                        <textarea id="additionalNote" rows="2" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-blue-500 transition-all" placeholder="Contoh: Ban bocor di KM 45..."></textarea>
                    </div>
                </div>

                <button onclick="submitUpdate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all active:scale-95 uppercase text-sm tracking-widest">
                    Kirim Update Sekarang
                </button>
            </div>
        </div>

        <div id="successState" class="hidden text-center py-10">
            <div class="bg-emerald-500/10 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 border border-emerald-500/50">
                <svg class="w-10 h-10 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-xl font-black text-white uppercase mb-2">Update Berhasil!</h2>
            <p class="text-slate-400 text-sm">Data telah tersimpan di sistem monitoring. Terima kasih, hati-hati di jalan.</p>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE (Samakan dengan index.html) ---
        const firebaseConfig = {
           apiKey: "AIzaSyBuFvsRVcZCZxdW1o1uQOsP-zW2ySOhhlM",
           authDomain: "tms-monitoring-6ea3e.firebaseapp.com",
           projectId: "tms-monitoring-6ea3e",
           storageBucket: "tms-monitoring-6ea3e.firebasestorage.app",
           messagingSenderId: "290573726581",
           appId: "1:290573726581:web:8293e1bb62f4d6606f193c",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const urlParams = new URLSearchParams(window.location.search);
        const deliveryID = urlParams.get('id');

        window.onload = loadDeliveryData;

        async function loadDeliveryData() {
            if (!deliveryID) {
                document.getElementById('loader').innerHTML = "<p class='text-red-500 font-bold'>LINK TIDAK VALID (ID Kosong)</p>";
                return;
            }

            try {
                const doc = await db.collection("vendor_updates").doc(deliveryID).get();
                if (doc.exists) {
                    const data = doc.data();
                    
                    // Isi dropdown ticket
                    const selectTicket = document.getElementById('selectTicket');
                    const ticketNo = data['Delivery Ticket'] || data['DELIVERY TICKET'] || deliveryID;
                    selectTicket.innerHTML = `<option value="${ticketNo}">${ticketNo}</option>`;

                    // Tampilkan info ringkas
                    document.getElementById('displayCustomer').innerText = data['Customer'] || "-";
                    document.getElementById('displayTruck').innerText = data['Truck'] || data['TRUCK'] || "-";
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('formContainer').classList.remove('hidden');
                } else {
                    document.getElementById('loader').innerHTML = "<p class='text-slate-400 uppercase font-bold text-sm'>Data Tidak Ditemukan</p>";
                }
            } catch (error) {
                console.error(error);
                alert("Gagal koneksi ke database.");
            }
        }

        async function submitUpdate() {
            const eta = document.getElementById('inputEta').value;
            const note = document.getElementById('inputNote').value;
            const extra = document.getElementById('additionalNote').value;

            if (!eta) return alert("Mohon isi jam estimasi tiba!");

            try {
                // Simpan respon ke dokumen yang sama
                await db.collection("vendor_updates").doc(deliveryID).update({
                    estimasi_tiba: eta,
                    catatan_vendor: note,
                    catatan_tambahan: extra,
                    last_vendor_update: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('formContainer').classList.add('hidden');
                document.getElementById('successState').classList.remove('hidden');
            } catch (error) {
                alert("Gagal mengirim data. Silakan coba lagi.");
            }
        }
    </script>
</body>
</html>
